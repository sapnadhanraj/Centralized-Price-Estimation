<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIH 2024</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            width: 100%;
        }

        .heading {
            color: white;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 24px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
            max-width: 520px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.5;
        }

        .form-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
        }

        .form-container h2 {
            color: #333;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background-color: #ffffff;
            color: #333;
            font-size: 15px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
            outline: none;
        }

        input::placeholder {
            color: #aaa;
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 8px;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .toggle-link {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
            text-align: center;
        }

        .toggle-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .toggle-link a:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none;
        }

        .alert-message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            animation: fadeIn 0.3s ease-in;
            text-align: left;
        }

        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-info {
            background-color: #dce8ff;
            color: #1a3a6e;
            border: 1px solid #b8d0ff;
        }

        small {
            color: #999;
            font-size: 12px;
            margin-top: 5px;
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="heading">Welcome to Centralized Automated Solution for Price Estimation & Reasonability.</h1>
        <div class="form-container" id="registrationForm">
            <h2>Register</h2>
            <div id="registerAlert" class="alert-message"></div>
            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Enter your name" pattern="[A-Za-z ]+" title="Name can only contain letters and spaces" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="mobile">Phone Number</label>
                    <input type="tel" id="mobile" placeholder="Enter 10-digit phone number" maxlength="10" pattern="[0-9]{10}" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Must contain capital, symbol & digit" required>
                    <small>Password must have: 1 uppercase, 1 symbol, 1 digit</small>
                </div>
                <button type="submit">Register</button>
                <p class="toggle-link">Already have an account? <a href="#" id="switchToLogin">Login here</a></p>
            </form>
        </div>

        <div class="form-container hidden" id="loginForm">
            <h2>Login</h2>
            <div id="loginAlert" class="alert-message"></div>
            <form id="loginFormElement">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>
                <button type="submit">Login</button>
                <p class="toggle-link">Don't have an account? <a href="#" id="switchToRegister">Register here</a></p>
            </form>
        </div>
    </div>
    

    <script>
        // Function to show alert messages
        function showAlert(elementId, message, type) {
            const alertElement = document.getElementById(elementId);
            alertElement.textContent = message;
            alertElement.className = `alert-message alert-${type}`;
            alertElement.style.display = 'block';
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                alertElement.style.display = 'none';
            }, 5000);
        }

        // Name validation function
        function validateName(name) {
            return /^[A-Za-z ]+$/.test(name.trim());
        }

        // Block non-letter characters from the name field in real time
        document.getElementById('name').addEventListener('input', function() {
            this.value = this.value.replace(/[^A-Za-z ]/g, '');
        });

        // Email validation function
        function validateEmail(email) {
            // Must match standard format: local@domain.tld
            // Domain part must have exactly one dot-separated TLD (no repeated extensions like .com.com)
            const emailRegex = /^[^\s@]+@[a-zA-Z0-9-]+(\.[a-zA-Z0-9-]+)*\.[a-zA-Z]{2,}$/;
            if (!emailRegex.test(email)) return false;
            // Reject if the TLD part contains duplicate extensions e.g. .com.com
            const domainPart = email.split('@')[1];
            const parts = domainPart.split('.');
            const tldParts = parts.slice(1); // everything after first label
            const uniqueTlds = new Set(tldParts.map(p => p.toLowerCase()));
            if (uniqueTlds.size !== tldParts.length) return false;
            return true;
        }

        // Phone validation function
        function validatePhone(phone) {
            const phoneRegex = /^[0-9]{10}$/;
            return phoneRegex.test(phone);
        }

        // Password validation function
        function validatePassword(password) {
            // Must contain: at least 1 uppercase, 1 symbol, 1 digit
            const hasUppercase = /[A-Z]/.test(password);
            const hasSymbol = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password);
            const hasDigit = /[0-9]/.test(password);
            
            return hasUppercase && hasSymbol && hasDigit && password.length >= 6;
        }

        document.getElementById("registerForm").addEventListener("submit", function(event) {
            event.preventDefault();
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const mobile = document.getElementById("mobile").value;
            const password = document.getElementById("password").value;

            // Validate name
            if (!validateName(name)) {
                showAlert('registerAlert', 'Name can only contain letters and spaces. Numbers and special characters are not allowed.', 'error');
                return;
            }

            // Validate email
            if (!validateEmail(email)) {
                showAlert('registerAlert', 'Please enter a valid email address.', 'error');
                return;
            }

            // Validate phone
            if (!validatePhone(mobile)) {
                showAlert('registerAlert', 'Please enter a valid 10-digit phone number.', 'error');
                return;
            }

            // Validate password
            if (!validatePassword(password)) {
                showAlert('registerAlert', 'Password must contain at least: 1 uppercase letter, 1 symbol (!@#$%^&*), 1 digit, and minimum 6 characters.', 'error');
                return;
            }

            if (name && email && mobile && password) {
                // Check if email already exists
                const existingUsers = JSON.parse(localStorage.getItem("locopilot")) || [];
                const emailExists = Array.isArray(existingUsers) 
                    ? existingUsers.some(user => user.email === email)
                    : existingUsers.email === email;
                
                if (emailExists) {
                    showAlert('registerAlert', 'Email already registered! Please use a different email.', 'error');
                    return;
                }

                // Store as array for multiple users
                const newUser = { 
                    name, 
                    email, 
                    mobile,
                    password
                };

                if (Array.isArray(existingUsers)) {
                    existingUsers.push(newUser);
                    localStorage.setItem("locopilot", JSON.stringify(existingUsers));
                } else if (Object.keys(existingUsers).length === 0) {
                    localStorage.setItem("locopilot", JSON.stringify([newUser]));
                } else {
                    localStorage.setItem("locopilot", JSON.stringify([existingUsers, newUser]));
                }

                showAlert('registerAlert', 'Registration successful! Please login.', 'success');
                setTimeout(() => {
                    toggleForms();
                    document.getElementById("registerForm").reset();
                }, 1500);
            } else {
                showAlert('registerAlert', 'Please fill in all fields.', 'error');
            }
        });

        document.getElementById("loginFormElement").addEventListener("submit", function(event) {
            event.preventDefault();
            const loginEmail = document.getElementById("loginEmail").value;
            const loginPassword = document.getElementById("loginPassword").value;
            
            const locopilotData = JSON.parse(localStorage.getItem("locopilot")) || [];
            
            let foundUser = null;
            if (Array.isArray(locopilotData)) {
                foundUser = locopilotData.find(user => user.email === loginEmail && user.password === loginPassword);
            } else {
                if (locopilotData.email === loginEmail && locopilotData.password === loginPassword) {
                    foundUser = locopilotData;
                }
            }

            if (foundUser) {
                // Store current logged-in user session
                localStorage.setItem("currentUser", JSON.stringify({
                    name: foundUser.name,
                    email: foundUser.email,
                    mobile: foundUser.mobile
                }));
                showAlert('loginAlert', 'Login successful! Welcome ' + foundUser.name, 'success');
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1000);
            } else {
                showAlert('loginAlert', 'Invalid credentials. Please try again.', 'error');
            }
        });

        document.getElementById("switchToLogin").addEventListener("click", function(event) {
            event.preventDefault();
            toggleForms();
        });

        document.getElementById("switchToRegister").addEventListener("click", function(event) {
            event.preventDefault();
            toggleForms();
        });

        function toggleForms() {
            document.getElementById("registrationForm").classList.toggle("hidden");
            document.getElementById("loginForm").classList.toggle("hidden");
            // Clear alerts when switching forms
            document.getElementById("registerAlert").style.display = 'none';
            document.getElementById("loginAlert").style.display = 'none';
        }
    </script>
    
</body>

</html>
